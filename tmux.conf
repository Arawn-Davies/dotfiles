# ── Prefix ────────────────────────────────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix          # C-a C-a sends literal C-a to inner app

# ── Core behaviour ─────────────────────────────────────────────────────────────
set -g mouse on
set -g base-index 1           # windows start at 1 (easier to reach on keyboard)
set -g pane-base-index 1
set -g renumber-windows on    # close window 2 → window 3 becomes window 2
set -s escape-time 0          # no delay after Esc (important for editors)
set -g focus-events on        # pass focus events through (needed by some editors)
set -g history-limit 50000
set -g status-interval 2       # claude-tick.sh sweeps pane state every 2s

# ── Terminal colours (true colour + italics) ───────────────────────────────────
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:RGB"
set -ga terminal-overrides ",*256col*:Tc"

# ── Pane borders with titles (helps spatial memory) ───────────────────────────
set -g pane-border-status top
set -g pane-border-format " #T "
set -g pane-border-style fg=#313244
set -g pane-active-border-style fg=#89b4fa

# ── Status bar ─────────────────────────────────────────────────────────────────
set -g status-position top
set -g status-style bg=#1e1e2e,fg=#cdd6f4
set -g status-left-length 40
set -g status-left " #[fg=#cba6f7,bold]#S#[default]  "
set -g status-right "#(~/.config/tmux/scripts/claude-tick.sh)#[fg=#6c7086] %H:%M "
set -g window-status-format         "#[fg=#a6adc8] #I:#W#{?#{==:#{@claude_alert},urgent}, #[fg=#f38ba8]●#[fg=#a6adc8],#{?#{==:#{@claude_alert},done}, #[fg=#89b4fa]●#[fg=#a6adc8],#{?#{==:#{@claude_alert},working}, #[fg=#f9e2af]●#[fg=#a6adc8],}}} "
set -g window-status-current-format "#[fg=#1e1e2e,bold,bg=#cba6f7] #I:#W#{?#{==:#{@claude_alert},urgent}, #[fg=#f38ba8]●#[fg=#1e1e2e],#{?#{==:#{@claude_alert},done}, #[fg=#89b4fa]●#[fg=#1e1e2e],#{?#{==:#{@claude_alert},working}, #[fg=#f9e2af]●#[fg=#1e1e2e],}}} "

# ── Splits: | for vertical divider, - for horizontal divider ──────────────────
# (these match the visual shape of the split they create)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ── Alt+Arrow: move between panes without prefix ──────────────────────────────
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# ── Prefix+W: build standard worktree layout ──────────────────────────────────
# Left = tall editor pane (60%), right column = top shell + bottom shell
bind W split-window -h -p 50 -c "#{pane_current_path}" \; \
         split-window -v -p 50 -c "#{pane_current_path}" \; \
         select-pane -t 1 \; select-pane -T "editor" \; \
         select-pane -t 2 \; select-pane -T "tests" \; \
         select-pane -t 3 \; select-pane -T "git" \; \
         select-pane -t 1

# ── Resize panes with prefix+arrow (hold prefix, tap arrow repeatedly) ─────────
bind -r Left  resize-pane -L 5
bind -r Right resize-pane -R 5
bind -r Up    resize-pane -U 5
bind -r Down  resize-pane -D 5

# ── New window/pane inherits current directory ────────────────────────────────
bind c new-window -c "#{pane_current_path}"

# ── Copy mode: vi keys + system clipboard ─────────────────────────────────────
set -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
if-shell "uname | grep -q Darwin" \
  "bind -T copy-mode-vi y send -X copy-pipe-and-cancel 'pbcopy'" \
  "bind -T copy-mode-vi y send -X copy-pipe-and-cancel 'xclip -in -selection clipboard'"

# ── Reload config ─────────────────────────────────────────────────────────────
bind R source-file ~/.tmux.conf \; display "Config reloaded"

# ── Claude session status ─────────────────────────────────────────────────────
set-hook -g pane-focus-in "run-shell \"~/.config/tmux/scripts/claude-clear-done.sh #{pane_id}\""
bind A run-shell "~/.config/tmux/scripts/claude-jump.sh"   # prefix C-a A → jump to oldest blocked Claude
