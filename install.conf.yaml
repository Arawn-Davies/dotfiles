- defaults:
    link:
      relink: true
      create: true

- clean: ["~", "~/.config"]

# Managed files. `force` replaces the pre-existing real file with a symlink;
# safe here because their content is preserved in the repo (zshrc secrets live
# in the untracked ~/.zshrc.local, sourced by the tracked zshrc).
# Deliberately NOT managed (left as your live real files): ~/.gitconfig,
# ~/.config/git/ignore, ~/.config/kitty/kitty.conf, ~/.config/sketchybar/sketchybarrc.
- link:
    ~/.zshrc:
      path: zshrc
      force: true
    ~/worktrees.sh:
      path: worktrees.sh
      force: true
    ~/.tmux.conf:
      path: tmux.conf
      force: true
    ~/.claude/statusline-command.sh:
      path: claude/statusline-command.sh
      force: true
    ~/.config/bat: bat
    ~/.config/lazygit: lazygit
    ~/.config/ranger: ranger
    ~/.fzfrc: fzfrc
    ~/.asdfrc: asdfrc
    ~/.Brewfile: homebrew/Brewfile
    ~/.config/nvim: neovim
    ~/.config/tmux/scripts: tmux/scripts
