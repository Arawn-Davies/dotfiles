- defaults:
    link:
      relink: true
      create: true

- clean: ["~", "~/.config"]

# Managed files. `force: true` replaces a pre-existing real file with a symlink;
# used only on files whose content is already in the repo (zshrc secrets live in
# the untracked ~/.zshrc.local, sourced by the tracked zshrc), so nothing is lost.
# Deliberately NOT managed (left as live real files, so `./install` will not
# provision them on a fresh machine): ~/.gitconfig, ~/.config/git/ignore.
# Note their repo copies are still tracked and can drift from the live files.
- link:
    ~/.zshrc:
      path: zshrc
      force: true
    ~/worktrees.sh:
      path: worktrees.sh
      force: true
    ~/.tmux.conf:
      path: tmux.conf
      force: true
    ~/.claude/statusline-command.sh:
      path: claude/statusline-command.sh
      force: true
    ~/.config/bat: bat
    ~/.config/lazygit: lazygit
    ~/.config/ranger: ranger
    ~/.fzfrc: fzfrc
    ~/.asdfrc: asdfrc
    ~/.Brewfile: homebrew/Brewfile
    ~/.config/nvim: neovim
    ~/.config/tmux/scripts: tmux/scripts
    ~/.config/kitty/kitty.conf:
      path: .config/kitty/kitty.conf
      force: true
    ~/.config/sketchybar:
      path: .config/sketchybar
      force: true
